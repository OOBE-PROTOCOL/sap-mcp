name: Desktop Wizard Release

on:
  workflow_dispatch:
  push:
    tags:
      - '*'

permissions:
  contents: write

jobs:
  desktop:
    name: Build desktop wizard (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-15
          - windows-2025
          - ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.7.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify release gates
        run: |
          pnpm run typecheck
          pnpm run lint
          pnpm run test:run
          pnpm audit --audit-level moderate

      - name: Require macOS release signing secrets
        if: matrix.os == 'macos-15' && github.ref_type == 'tag'
        env:
          CSC_LINK: ${{ secrets.MACOS_CSC_LINK || secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.MACOS_CSC_KEY_PASSWORD || secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          missing=0
          for name in CSC_LINK CSC_KEY_PASSWORD APPLE_ID APPLE_APP_SPECIFIC_PASSWORD APPLE_TEAM_ID; do
            if [ -z "${!name}" ]; then
              echo "::error::Missing required macOS release signing secret: ${name}"
              missing=1
            fi
          done
          exit "$missing"

      - name: Build desktop artifacts
        run: pnpm run desktop:build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.MACOS_CSC_LINK || secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.MACOS_CSC_KEY_PASSWORD || secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Upload desktop artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sap-mcp-wizard-${{ matrix.os }}
          path: |
            release/desktop/*.dmg
            release/desktop/*.zip
            release/desktop/*.exe
            release/desktop/*.tar.gz
            release/desktop/*.blockmap
            release/desktop/latest*.yml
          if-no-files-found: error

      - name: Attach artifacts to GitHub release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: |
            release/desktop/*.dmg
            release/desktop/*.zip
            release/desktop/*.exe
            release/desktop/*.tar.gz
            release/desktop/*.blockmap
            release/desktop/latest*.yml
