packages:
  - .

overrides:
  '@hono/node-server': 2.0.10
  bigint-buffer: file:vendor/bigint-buffer
  brace-expansion@<1.1.16: 1.1.16
  brace-expansion@>=2.0.0 <2.1.2: 2.1.2
  esbuild: ^0.28.1
  fast-uri: 3.1.4
  hono: 4.12.27
  js-yaml@>=4.0.0 <4.3.0: 4.3.0
  langsmith: ^0.6.0
  uuid: ^11.1.1
